<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Game Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --text-primary: #eee;
      --text-secondary: #aaa;
      --border-color: #1a4a7a;
      --success: #4CAF50;
      --warning: #ff9800;
      --error: #f44336;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部工具栏 */
    .top-bar {
      background-color: var(--bg-secondary);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--accent), #ff6b81);
      border-radius: 4px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background-color: var(--border-color);
    }

    .btn {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .btn.active {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .btn.play {
      background-color: var(--success);
      border-color: var(--success);
    }

    .btn.play:hover {
      background-color: #45a049;
    }

    .btn.pause {
      background-color: var(--warning);
      border-color: var(--warning);
    }

    .btn-icon {
      width: 32px;
      padding: 6px;
      justify-content: center;
    }

    /* 主内容区 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 左侧面板 */
    .left-panel {
      width: 280px;
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 16px;
      background-color: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-actions {
      display: flex;
      gap: 4px;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* 场景树 */
    .scene-tree {
      list-style: none;
    }

    .scene-tree-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      background-color: var(--bg-tertiary);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .scene-tree-item:hover {
      background-color: var(--border-color);
    }

    .scene-tree-item.selected {
      background-color: var(--accent);
    }

    .scene-tree-item .icon {
      width: 16px;
      height: 16px;
      font-size: 14px;
    }

    .scene-tree-item .eye-icon {
      margin-left: auto;
      opacity: 0.6;
    }

    .scene-tree-item .eye-icon:hover {
      opacity: 1;
    }

    .scene-tree-item.hidden {
      opacity: 0.5;
    }

    /* 添加物体菜单 */
    .add-menu {
      position: absolute;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px;
      z-index: 1000;
      min-width: 150px;
      display: none;
    }

    .add-menu.visible {
      display: block;
    }

    .add-menu-item {
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-menu-item:hover {
      background-color: var(--accent);
    }

    /* 中间3D视图 */
    .center-panel {
      flex: 1;
      position: relative;
      background-color: #000;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    /* 视图工具栏 */
    .view-toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }

    .view-btn {
      background-color: rgba(22, 33, 62, 0.9);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .view-btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .view-btn.active {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    /* 右侧属性面板 */
    .right-panel {
      width: 320px;
      background-color: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .property-section {
      border-bottom: 1px solid var(--border-color);
    }

    .section-header {
      padding: 10px 16px;
      background-color: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .section-header:hover {
      background-color: var(--border-color);
    }

    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-content {
      padding: 12px 16px;
    }

    .section-content.collapsed {
      display: none;
    }

    /* 属性行 */
    .property-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .property-label {
      width: 70px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .property-input-group {
      flex: 1;
      display: flex;
      gap: 4px;
    }

    .property-input {
      flex: 1;
      padding: 6px 8px;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
      transition: border-color 0.2s;
    }

    .property-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .property-input.vector {
      text-align: right;
    }

    .vector-label {
      position: absolute;
      left: 4px;
      font-size: 11px;
      color: var(--accent);
      font-weight: bold;
    }

    .vector-wrapper {
      position: relative;
      flex: 1;
    }

    .vector-wrapper .property-input {
      padding-left: 20px;
    }

    /* 颜色选择器 */
    .color-picker-wrapper {
      flex: 1;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-preview {
      width: 36px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      cursor: pointer;
    }

    input[type="color"] {
      opacity: 0;
      position: absolute;
      cursor: pointer;
    }

    /* 滑块 */
    .slider-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--bg-tertiary);
      border-radius: 2px;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-value {
      min-width: 40px;
      text-align: right;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* 下拉选择 */
    .property-select {
      flex: 1;
      padding: 6px 8px;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
    }

    .property-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* 材质预设 */
    .material-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .material-preset {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
    }

    .material-preset:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }

    .material-preset.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    /* 底部状态栏 */
    .bottom-bar {
      background-color: var(--bg-secondary);
      padding: 6px 16px;
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--success);
    }

    .status-dot.disconnected {
      background-color: var(--error);
    }

    .status-text {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mode-indicator {
      background-color: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
    }

    /* 提示框 */
    .tooltip {
      position: absolute;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-primary);
      pointer-events: none;
      z-index: 1000;
      display: none;
    }

    /* 选中物体高亮提示 */
    .selection-info {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background-color: rgba(22, 33, 62, 0.9);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-primary);
      z-index: 10;
    }

    .selection-info:empty {
      display: none;
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-color);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon"></div>
      <span>Mini Game Engine</span>
    </div>
    
    <div class="toolbar">
      <!-- 变换工具 -->
      <button class="btn btn-icon active" id="tool-select" title="选择工具 (Q)">
        <span>⬚</span>
      </button>
      <button class="btn btn-icon" id="tool-move" title="移动工具 (W)">
        <span>✥</span>
      </button>
      <button class="btn btn-icon" id="tool-rotate" title="旋转工具 (E)">
        <span>⟳</span>
      </button>
      <button class="btn btn-icon" id="tool-scale" title="缩放工具 (R)">
        <span>⤡</span>
      </button>
      
      <div class="toolbar-divider"></div>
      
      <!-- 添加物体 -->
      <button class="btn" id="btn-add-cube">
        <span>▢</span>
        <span>立方体</span>
      </button>
      <button class="btn" id="btn-add-sphere">
        <span>●</span>
        <span>球体</span>
      </button>
      <button class="btn" id="btn-add-cylinder">
        <span>◎</span>
        <span>圆柱体</span>
      </button>
      <button class="btn" id="btn-add-plane">
        <span>▬</span>
        <span>平面</span>
      </button>
      <button class="btn" id="btn-add-light">
        <span>☀</span>
        <span>灯光</span>
      </button>
      
      <div class="toolbar-divider"></div>
      
      <!-- 删除按钮 -->
      <button class="btn" id="btn-delete" title="删除选中物体 (Delete)">
        <span>🗑</span>
        <span>删除</span>
      </button>
      
      <!-- 复制按钮 -->
      <button class="btn" id="btn-duplicate" title="复制选中物体 (Ctrl+D)">
        <span>⧉</span>
        <span>复制</span>
      </button>
      
      <div class="toolbar-divider"></div>
      
      <!-- 播放控制 -->
      <button class="btn play" id="play-btn" title="开始执行">
        <span>▶</span>
        <span>开始执行</span>
      </button>
      <button class="btn" id="reset-btn" title="重置场景">
        <span>↺</span>
        <span>重置</span>
      </button>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-container">
    <!-- 左侧面板 - 场景层级 -->
    <div class="left-panel">
      <div class="panel-header">
        <span class="panel-title">场景层级</span>
        <div class="panel-actions">
          <button class="btn btn-icon" id="btn-add-object" title="添加物体">
            <span>+</span>
          </button>
        </div>
      </div>
      <div class="panel-content">
        <ul class="scene-tree" id="scene-tree">
          <!-- 动态填充 -->
        </ul>
      </div>
      
      <!-- 材质库 -->
      <div class="panel-header">
        <span class="panel-title">材质库</span>
      </div>
      <div class="panel-content">
        <div class="material-presets" id="material-presets">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>

    <!-- 中间3D视图 -->
    <div class="center-panel">
      <div class="view-toolbar">
        <button class="view-btn active" id="view-perspective">透视</button>
        <button class="view-btn" id="view-top">顶</button>
        <button class="view-btn" id="view-front">前</button>
        <button class="view-btn" id="view-right">右</button>
        <button class="view-btn" id="view-reset">重置视图</button>
      </div>
      
      <div id="canvas-container"></div>
      
      <div class="selection-info" id="selection-info"></div>
    </div>

    <!-- 右侧属性面板 -->
    <div class="right-panel" id="properties-panel">
      <div class="empty-state" id="no-selection">
        <div class="empty-state-icon">📦</div>
        <div>选择一个物体查看属性</div>
        <div style="margin-top: 8px; font-size: 11px; opacity: 0.7;">
          点击场景中的物体或在场景树中选择
        </div>
      </div>
      
      <!-- 物体名称 -->
      <div class="property-section" id="section-name" style="display: none;">
        <div class="section-header">
          <span class="section-title">物体</span>
        </div>
        <div class="section-content">
          <div class="property-row">
            <span class="property-label">名称</span>
            <input type="text" class="property-input" id="obj-name" placeholder="物体名称">
          </div>
          <div class="property-row">
            <span class="property-label">类型</span>
            <span class="property-input" style="background: transparent; border: none; padding: 0;" id="obj-type">-</span>
          </div>
        </div>
      </div>
      
      <!-- 变换 -->
      <div class="property-section" id="section-transform" style="display: none;">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-title">变换</span>
          <span>▼</span>
        </div>
        <div class="section-content">
          <!-- 位置 -->
          <div class="property-row">
            <span class="property-label">位置</span>
            <div class="property-input-group">
              <div class="vector-wrapper">
                <span class="vector-label">X</span>
                <input type="number" class="property-input vector" id="pos-x" value="0" step="0.1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Y</span>
                <input type="number" class="property-input vector" id="pos-y" value="0" step="0.1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Z</span>
                <input type="number" class="property-input vector" id="pos-z" value="0" step="0.1">
              </div>
            </div>
          </div>
          
          <!-- 旋转 -->
          <div class="property-row">
            <span class="property-label">旋转</span>
            <div class="property-input-group">
              <div class="vector-wrapper">
                <span class="vector-label">X</span>
                <input type="number" class="property-input vector" id="rot-x" value="0" step="1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Y</span>
                <input type="number" class="property-input vector" id="rot-y" value="0" step="1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Z</span>
                <input type="number" class="property-input vector" id="rot-z" value="0" step="1">
              </div>
            </div>
          </div>
          
          <!-- 缩放 -->
          <div class="property-row">
            <span class="property-label">缩放</span>
            <div class="property-input-group">
              <div class="vector-wrapper">
                <span class="vector-label">X</span>
                <input type="number" class="property-input vector" id="scale-x" value="1" step="0.1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Y</span>
                <input type="number" class="property-input vector" id="scale-y" value="1" step="0.1">
              </div>
              <div class="vector-wrapper">
                <span class="vector-label">Z</span>
                <input type="number" class="property-input vector" id="scale-z" value="1" step="0.1">
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 材质 -->
      <div class="property-section" id="section-material" style="display: none;">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-title">材质</span>
          <span>▼</span>
        </div>
        <div class="section-content">
          <div class="property-row">
            <span class="property-label">颜色</span>
            <div class="color-picker-wrapper">
              <div class="color-preview" id="color-preview" style="background-color: #ff0000;"></div>
              <input type="color" class="property-input" id="material-color" value="#ff0000">
            </div>
          </div>
          
          <div class="property-row">
            <span class="property-label">预设</span>
          </div>
          <div class="material-presets" id="obj-material-presets">
            <!-- 动态填充 -->
          </div>
          
          <div class="property-row" style="margin-top: 12px;">
            <span class="property-label">粗糙度</span>
            <div class="slider-wrapper">
              <input type="range" id="material-roughness" min="0" max="1" step="0.01" value="0.5">
              <span class="slider-value" id="roughness-value">0.5</span>
            </div>
          </div>
          
          <div class="property-row">
            <span class="property-label">金属度</span>
            <div class="slider-wrapper">
              <input type="range" id="material-metalness" min="0" max="1" step="0.01" value="0.3">
              <span class="slider-value" id="metalness-value">0.3</span>
            </div>
          </div>
          
          <div class="property-row">
            <span class="property-label">透明度</span>
            <div class="slider-wrapper">
              <input type="range" id="material-opacity" min="0" max="1" step="0.01" value="1">
              <span class="slider-value" id="opacity-value">1.0</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 光照 -->
      <div class="property-section" id="section-light" style="display: none;">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-title">光照</span>
          <span>▼</span>
        </div>
        <div class="section-content">
          <div class="property-row">
            <span class="property-label">强度</span>
            <div class="slider-wrapper">
              <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="1">
              <span class="slider-value" id="light-intensity-value">1.0</span>
            </div>
          </div>
          
          <div class="property-row">
            <span class="property-label">颜色</span>
            <div class="color-picker-wrapper">
              <div class="color-preview" id="light-color-preview" style="background-color: #ffffff;"></div>
              <input type="color" class="property-input" id="light-color" value="#ffffff">
            </div>
          </div>
          
          <div class="property-row">
            <span class="property-label">阴影</span>
            <select class="property-select" id="light-shadow">
              <option value="true">启用</option>
              <option value="false">禁用</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <div class="bottom-bar">
    <div class="status-indicator">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">独立模式</span>
    </div>
    <div class="status-text">
      <span id="fps-display">FPS: --</span>
      <span id="object-count">物体: 1</span>
      <span id="selected-count">选中: 0</span>
      <span class="mode-indicator" id="current-mode">选择模式</span>
    </div>
    <div id="version-info">v1.0.0</div>
  </div>

  <!-- 添加物体菜单 -->
  <div class="add-menu" id="add-menu">
    <div class="add-menu-item" data-type="cube">
      <span>▢</span>
      <span>立方体</span>
    </div>
    <div class="add-menu-item" data-type="sphere">
      <span>●</span>
      <span>球体</span>
    </div>
    <div class="add-menu-item" data-type="cylinder">
      <span>◎</span>
      <span>圆柱体</span>
    </div>
    <div class="add-menu-item" data-type="plane">
      <span>▬</span>
      <span>平面</span>
    </div>
    <div class="add-menu-item" data-type="light">
      <span>☀</span>
      <span>点光源</span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  
  <script>
    // 折叠/展开面板
    function toggleSection(header) {
      const content = header.nextElementSibling;
      const icon = header.querySelector('span:last-child');
      
      if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        icon.textContent = '▼';
      } else {
        content.classList.add('collapsed');
        icon.textContent = '▶';
      }
    }
  </script>
</body>
</html>
